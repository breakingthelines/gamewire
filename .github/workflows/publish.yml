name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BTL_GAFFER_APP_ID }}
          private-key: ${{ secrets.BTL_GAFFER_PRIVATE_KEY }}
          owner: breakingthelines
          permission-contents: read
          permission-packages: read

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_PKG_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_TOKEN: ${{ steps.app-token.outputs.token }}
          NODE_AUTH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Publish to GitHub Packages
        run: bun publish --no-git-checks
        env:
          GITHUB_TOKEN: ${{ github.token }}
