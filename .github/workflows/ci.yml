name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GH_PKG_TOKEN || github.token }}
      GH_PKG_TOKEN: ${{ secrets.GH_PKG_TOKEN || github.token }}
      NPM_CONFIG_TOKEN: ${{ secrets.GH_PKG_TOKEN || github.token }}
      NODE_AUTH_TOKEN: ${{ secrets.GH_PKG_TOKEN || github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Type check
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
