name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BTL_GAFFER_APP_ID }}
          private-key: ${{ secrets.BTL_GAFFER_PRIVATE_KEY }}
          owner: breakingthelines
          repositories: |
            gamewire
            protos
          permission-contents: read
          permission-packages: read

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_PKG_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_TOKEN: ${{ steps.app-token.outputs.token }}
          NODE_AUTH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Type check
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
